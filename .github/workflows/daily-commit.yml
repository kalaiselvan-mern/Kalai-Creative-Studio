name: Daily Auto Commit

on:
  schedule:
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  auto-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update log file
        run: |
          mkdir -p logs
          echo "$(date '+%Y-%m-%d %H:%M:%S') — daily check-in" >> logs/activity-log.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/activity-log.txt
          git diff --cached --quiet || git commit -m "chore: daily log update $(date '+%Y-%m-%d')"
          git push
